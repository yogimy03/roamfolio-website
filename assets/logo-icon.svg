<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="35%" cy="28%" r="80%">
      <stop offset="0%"   stop-color="#1C1050"/>
      <stop offset="55%"  stop-color="#0C1535"/>
      <stop offset="100%" stop-color="#050D20"/>
    </radialGradient>
    <!-- Ocean sphere lit from upper-left -->
    <radialGradient id="ocean" gradientUnits="userSpaceOnUse"
                    cx="400" cy="360" fx="400" fy="360" r="330">
      <stop offset="0%"   stop-color="#1E8FE8"/>
      <stop offset="28%"  stop-color="#0D66B8"/>
      <stop offset="62%"  stop-color="#083E80"/>
      <stop offset="100%" stop-color="#031E48"/>
    </radialGradient>
    <!-- Globe edge dimming (sphere illusion) -->
    <radialGradient id="sphereEdge" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="84%"  stop-color="rgba(0,0,0,0.32)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>
    <!-- Atmospheric rim glow -->
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="87%"  stop-color="rgba(40,130,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(20,80,200,0)"/>
    </radialGradient>
    <!-- Flight arc: gold → white → sky blue -->
    <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse"
                    x1="258" y1="752" x2="758" y2="258">
      <stop offset="0%"   stop-color="#FFB830"/>
      <stop offset="48%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#5DD4FC"/>
    </linearGradient>
    <!-- Soft wide glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>
    <!-- Tighter marker glow -->
    <filter id="mg" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <!-- Clip content to the globe circle -->
    <clipPath id="gc">
      <circle cx="512" cy="510" r="310"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="110" cy="85"  r="1.3" opacity="0.55"/>
    <circle cx="275" cy="140" r="0.9" opacity="0.40"/>
    <circle cx="845" cy="110" r="1.5" opacity="0.60"/>
    <circle cx="920" cy="210" r="1.0" opacity="0.45"/>
    <circle cx="80"  cy="360" r="1.2" opacity="0.40"/>
    <circle cx="955" cy="660" r="1.4" opacity="0.50"/>
    <circle cx="145" cy="790" r="0.8" opacity="0.35"/>
    <circle cx="895" cy="875" r="1.1" opacity="0.45"/>
    <circle cx="55"  cy="610" r="1.6" opacity="0.38"/>
    <circle cx="965" cy="415" r="0.7" opacity="0.40"/>
    <circle cx="500" cy="55"  r="1.0" opacity="0.45"/>
    <circle cx="35"  cy="180" r="0.8" opacity="0.45"/>
    <circle cx="990" cy="760" r="1.2" opacity="0.35"/>
    <circle cx="175" cy="915" r="1.2" opacity="0.35"/>
    <circle cx="808" cy="958" r="0.9" opacity="0.30"/>
  </g>

  <!-- Nebula haze behind globe -->
  <ellipse cx="420" cy="430" rx="380" ry="280"
           fill="rgba(30,80,200,0.10)" transform="rotate(-18 420 430)"/>

  <!-- ═══════════════════ GLOBE ═══════════════════ -->
  <!-- Atmosphere glow -->
  <circle cx="512" cy="510" r="342" fill="url(#atmo)"/>

  <!-- Ocean base -->
  <circle cx="512" cy="510" r="310" fill="url(#ocean)"/>

  <!-- Everything below clipped to globe boundary -->
  <g clip-path="url(#gc)">

    <!-- ── CONTINENTS ── -->
    <g fill="#2C7A22" opacity="0.90">
      <!-- North America -->
      <path d="M290,305 C320,285 368,292 385,325 C400,355 390,395 365,415
               C340,432 305,428 288,400 C270,370 268,322 290,305Z"/>
      <!-- Central America -->
      <path d="M345,425 C360,418 378,428 378,448 C378,465 362,476 348,468
               C334,460 332,430 345,425Z"/>
      <!-- South America -->
      <path d="M318,475 C348,455 390,462 402,498 C418,542 412,592 395,630
               C378,668 350,678 328,650 C305,620 300,575 308,530
               C316,492 296,492 318,475Z"/>
      <!-- Greenland -->
      <path d="M258,235 C278,222 305,230 310,252 C315,274 298,292 276,290
               C254,288 240,268 248,248Z" opacity="0.75"/>
      <!-- Europe -->
      <path d="M492,348 C518,333 555,342 568,370 C580,396 568,428 545,440
               C520,452 490,440 478,415 C465,390 468,362 492,348Z"/>
      <!-- Iberian peninsula -->
      <path d="M466,405 C480,395 498,400 502,420 C506,440 493,455 477,450
               C461,445 452,428 452,415Z" opacity="0.85"/>
      <!-- British Isles -->
      <path d="M462,328 C472,320 486,328 484,344 C482,360 468,366 456,355
               C445,344 452,334 462,328Z" opacity="0.80"/>
      <!-- Africa -->
      <path d="M495,460 C525,445 562,458 576,490 C592,528 586,578 568,614
               C550,650 520,658 498,636 C474,612 466,572 470,532
               C474,496 468,474 495,460Z"/>
      <!-- Madagascar -->
      <path d="M612,548 C622,540 636,548 636,564 C636,580 624,590 612,582
               C600,574 600,556 612,548Z" opacity="0.80"/>
      <!-- Asia main -->
      <path d="M568,298 C610,278 686,282 730,312 C766,338 772,378 752,412
               C730,448 688,462 645,456 C600,450 560,432 545,398
               C530,365 530,316 568,298Z"/>
      <!-- Indian subcontinent -->
      <path d="M592,450 C614,438 638,448 642,472 C646,496 630,520 610,525
               C589,530 570,516 568,492 C566,468 572,460 592,450Z"/>
      <!-- Japan islands -->
      <path d="M746,330 C758,320 774,330 772,348 C770,366 754,374 740,364
               C726,354 734,338 746,330Z" opacity="0.80"/>
      <!-- Southeast Asia -->
      <path d="M672,438 C694,426 720,436 724,460 C728,484 710,504 688,506
               C666,508 648,492 650,466 C652,445 655,446 672,438Z"/>
      <!-- Australia -->
      <path d="M658,555 C692,540 730,548 744,576 C756,600 744,632 720,640
               C694,648 662,630 652,604 C642,578 630,568 658,555Z"/>
      <!-- Antarctica (bottom strip) -->
      <path d="M202,784 Q360,762 512,770 Q664,762 822,784 L822,820 L202,820Z"
            opacity="0.45" fill="#B0DCA8"/>
    </g>

    <!-- Lit edges on continents (upper-left highlight) -->
    <g fill="#48A838" opacity="0.40">
      <path d="M292,308 C315,292 352,302 362,332 C370,358 354,382 330,388
               C308,394 288,376 285,352 C282,330 275,320 292,308Z"/>
      <path d="M576,300 C608,285 668,292 698,320 C722,344 718,370 694,384
               C668,398 630,392 612,368 C594,345 548,314 576,300Z"/>
    </g>

    <!-- Polar ice cap hint -->
    <ellipse cx="512" cy="210" rx="112" ry="28" fill="white" opacity="0.20"/>

    <!-- ── GRID LINES ── -->
    <g fill="none" stroke="rgba(185,225,255,0.48)" stroke-width="1.2">
      <!-- Equator (prominent) -->
      <ellipse cx="512" cy="510" rx="310" ry="72"
               stroke="rgba(185,225,255,0.65)" stroke-width="1.8"/>
      <!-- Tropics -->
      <ellipse cx="512" cy="385" rx="268" ry="60"/>
      <ellipse cx="512" cy="635" rx="268" ry="60"/>
      <!-- Arctic / Antarctic -->
      <ellipse cx="512" cy="268" rx="195" ry="42" opacity="0.70"/>
      <ellipse cx="512" cy="752" rx="195" ry="42" opacity="0.70"/>
      <!-- Meridians -->
      <line x1="512" y1="200" x2="512" y2="820"/>
      <path d="M512,200 Q358,355 358,510 Q358,665 512,820"/>
      <path d="M512,200 Q666,355 666,510 Q666,665 512,820"/>
      <path d="M512,200 Q215,355 215,510 Q215,665 512,820" opacity="0.55"/>
      <path d="M512,200 Q809,355 809,510 Q809,665 512,820" opacity="0.55"/>
      <!-- Horizontal parallels -->
      <line x1="204" y1="510" x2="820" y2="510" opacity="0.65"/>
      <line x1="250" y1="390" x2="775" y2="390" opacity="0.35"/>
      <line x1="250" y1="630" x2="775" y2="630" opacity="0.35"/>
    </g>

    <!-- Specular highlight (upper-left lens flare) -->
    <ellipse cx="395" cy="375" rx="92" ry="70"
             fill="white" opacity="0.09" transform="rotate(-22 395 375)"/>

    <!-- ── SECONDARY ROUTES (road + walk) ── -->
    <path d="M235,638 C332,598 448,574 572,570 C668,568 750,542 822,496"
          fill="none" stroke="#FFB830" stroke-width="5"
          stroke-linecap="round" opacity="0.65"/>
    <g fill="white" opacity="0.60">
      <circle cx="390" cy="578" r="9"/>
      <circle cx="590" cy="568" r="9"/>
      <circle cx="758" cy="540" r="9"/>
    </g>
    <g fill="#5DD4FC" opacity="0.58">
      <circle cx="328" cy="612" r="6"/>
      <circle cx="405" cy="594" r="6"/>
      <circle cx="484" cy="581" r="6"/>
      <circle cx="562" cy="574" r="6"/>
      <circle cx="640" cy="558" r="6"/>
    </g>

    <!-- Edge darkening (sphere illusion) -->
    <circle cx="512" cy="510" r="310" fill="url(#sphereEdge)"/>
  </g>

  <!-- Atmosphere ring -->
  <circle cx="512" cy="510" r="310" fill="none"
          stroke="rgba(80,180,255,0.45)" stroke-width="7"/>
  <circle cx="512" cy="510" r="321" fill="none"
          stroke="rgba(80,180,255,0.14)" stroke-width="14"/>

  <!-- ═══════════════════ FLIGHT ARC ═══════════════════ -->
  <!-- Gold glow -->
  <path d="M258,752 C312,248 698,205 758,258"
        fill="none" stroke="#FFB830" stroke-width="55"
        stroke-linecap="round" filter="url(#glow)" opacity="0.52"/>
  <!-- Sky glow (cool end) -->
  <path d="M258,752 C312,248 698,205 758,258"
        fill="none" stroke="#5DD4FC" stroke-width="32"
        stroke-linecap="round" filter="url(#glow)" opacity="0.35"/>
  <!-- Crisp gradient dashes -->
  <path d="M258,752 C312,248 698,205 758,258"
        fill="none" stroke="url(#arcGrad)" stroke-width="11"
        stroke-dasharray="26 17" stroke-linecap="round" opacity="0.98"/>

  <!-- ═══════════════════ MARKERS ═══════════════════ -->
  <!-- Origin (warm gold) -->
  <circle cx="258" cy="752" r="56" fill="#FFB830" filter="url(#mg)" opacity="0.55"/>
  <circle cx="258" cy="752" r="38" fill="#F4A01A" stroke="white" stroke-width="7" opacity="0.98"/>
  <circle cx="258" cy="752" r="15" fill="white" opacity="0.97"/>

  <!-- Mid-arc waypoint -->
  <circle cx="506" cy="295" r="17" fill="white" stroke="#FFB830" stroke-width="5" opacity="0.95"/>

  <!-- Destination (cool sky blue) -->
  <circle cx="758" cy="258" r="56" fill="#5DD4FC" filter="url(#mg)" opacity="0.52"/>
  <!-- Pin spike -->
  <line x1="758" y1="220" x2="758" y2="155"
        stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.96"/>
  <circle cx="758" cy="143" r="16" fill="#5DD4FC" stroke="white" stroke-width="5" opacity="0.98"/>
  <!-- Main circle -->
  <circle cx="758" cy="258" r="38" fill="#5DD4FC" stroke="white" stroke-width="7" opacity="0.98"/>
  <circle cx="758" cy="258" r="15" fill="white" opacity="0.97"/>
</svg>
